<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>公共设施隐患上报</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- 顶部导航栏 -->
        <header class="top-nav">
            <div class="back-btn">
                <i class="ri-arrow-left-line"></i>
            </div>
            <h1 class="title">公共设施隐患上报</h1>
            <div class="help-btn">
                <i class="ri-question-mark"></i>
            </div>
        </header>

        <!-- 表单容器 -->
        <main class="form-container">
            <!-- 隐患位置模块 -->
            <section class="module">
                <div class="module-title">
                    <span class="required-mark"></span>
                    <h2>隐患位置</h2>
                </div>
                
                <!-- 地图区域 -->
                <div class="map-area">
                    <img src="https://prototype-prod-1254106194.cos.ap-beijing.myqcloud.com/calicat/file/ai/canvas/image/1993870584029151232.jpg" alt="地图" class="map-bg">
                    <div class="location-marker">
                        <i class="ri-map-pin-fill"></i>
                    </div>
                    <button class="locate-btn">
                        <i class="ri-compass-3-fill"></i>
                    </button>
                </div>
                
                <!-- 地址信息栏 -->
                <div class="address-bar">
                    <div class="location-icon">
                        <i class="ri-map-pin-line"></i>
                    </div>
                    <div class="address-details">
                        <p class="address">北京市朝阳区建国路88号</p>
                        <p class="distance">距离您当前位置120米</p>
                    </div>
                    <button class="edit-btn">
                        <i class="ri-edit-line"></i>
                    </button>
                </div>
            </section>

            <!-- 权属类别模块 -->
            <section class="module">
                <div class="module-title">
                    <span class="required-mark"></span>
                    <h2>权属类别</h2>
                </div>
                
                <!-- 权属类别下拉框 -->
                <div class="dropdown-container">
                    <select class="dropdown-select" id="ownershipType">
                        <option value="">请选择权属类别</option>
                        <option value="市政">市政</option>
                        <option value="电力">电力</option>
                        <option value="通信">通信</option>
                        <option value="水务">水务</option>
                        <option value="燃气">燃气</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
            </section>

            <!-- 隐患类型模块 -->
            <section class="module">
                <div class="module-title">
                    <span class="required-mark"></span>
                    <h2>隐患类型</h2>
                </div>
                
                <!-- 隐患类型下拉框 -->
                <div class="dropdown-container">
                    <select class="dropdown-select" id="hazardType">
                        <option value="">请选择隐患类型</option>
                        <option value="丢失">丢失</option>
                        <option value="破损">破损</option>
                        <option value="断裂">断裂</option>
                        <option value="松动">松动</option>
                        <option value="沉降">沉降</option>
                        <option value="高低不平">高低不平</option>
                        <option value="其他">其他</option>
                    </select>
                </div>
                

            </section>
            
            <!-- 现场照片模块 -->
            <section class="module">
                <div class="module-title">
                    <span class="required-mark"></span>
                    <h2>现场照片</h2>
                    <span class="photo-count">最多9张</span>
                </div>
                <div class="photo-grid">
                    <div class="photo-item">
                        <img src="https://prototype-prod-1254106194.cos.ap-beijing.myqcloud.com/calicat/file/ai/canvas/image/2034868105946013696.jpg" alt="照片1">
                        <div class="delete-btn">
                            <i class="ri-close-line"></i>
                        </div>
                    </div>
                    <div class="photo-item">
                        <img src="https://prototype-prod-1254106194.cos.ap-beijing.myqcloud.com/calicat/file/ai/canvas/image/2034868105946013696.jpg" alt="照片2">
                        <div class="delete-btn">
                            <i class="ri-close-line"></i>
                        </div>
                    </div>
                    <div class="photo-item add-photo">
                        <i class="ri-camera-fill"></i>
                        <p>添加照片</p>
                        <input type="file" class="photo-input" accept="image/*" multiple>
                    </div>
                </div>
            </section>

            <!-- 提交按钮 -->
            <button class="submit-btn">提交上报</button>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
