<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>上报成功</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="success-container">
        <!-- 成功图标 -->
        <div class="success-icon">
            <i class="ri-checkbox-circle-fill"></i>
        </div>
        
        <!-- 成功标题 -->
        <h1 class="success-title">上报成功</h1>
        
        <!-- 成功描述 -->
        <p class="success-description">感谢您的反馈，我们将尽快处理您上报的隐患</p>
        
        <!-- 上报编号 -->
        <div class="report-number">
            <p>上报编号：YZ2026032000127</p>
        </div>
        
        <!-- 预计处理时间 -->
        <div class="processing-time">
            <i class="ri-time-line"></i>
            <p>预计处理时间：3个工作日</p>
        </div>
        
        <!-- 按钮组 -->
        <div class="button-group">
            <button class="success-btn view-record-btn">查看上报记录</button>
            <button class="success-btn continue-report-btn">继续上报其他隐患</button>
            <button class="success-btn back-home-btn">返回首页</button>
        </div>
    </div>

    <script src="success.js"></script>
</body>
</html>
